{{- if .Values.kong.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "krystalinex.fullname" . }}-kong-config
  labels:
    {{- include "krystalinex.labels" . | nindent 4 }}
    app.kubernetes.io/component: kong
data:
  kong.yml: |
    _format_version: "3.0"
    _transform: true

    services:
      - name: kx-exchange-api
        url: http://{{ include "krystalinex.fullname" . }}-server:5000
        connect_timeout: 10000
        write_timeout: 60000
        read_timeout: 60000
        retries: 2
        routes:
          - name: api-route
            paths:
              - /api
            strip_path: false
            preserve_host: true
            protocols:
              - http

    plugins:
      # OpenTelemetry — the primary reason for Kong in the platform
      - name: opentelemetry
        config:
          endpoint: http://{{ include "krystalinex.fullname" . }}-otel-collector:4318/v1/traces
          resource_attributes:
            service.name: kx-gateway
          header_type: w3c

      # CORS — propagate W3C trace context headers
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Content-Type
            - Authorization
            - traceparent
            - tracestate
            - x-trace-id
            - x-span-id
            - x-correlation-id
          exposed_headers:
            - traceparent
            - tracestate
            - x-trace-id
            - x-span-id
          credentials: true
          max_age: 3600

      # Prometheus metrics
      - name: prometheus
        config:
          per_consumer: false
          status_code_metrics: true
          latency_metrics: true
          bandwidth_metrics: true
          upstream_health_metrics: true
{{- end }}
