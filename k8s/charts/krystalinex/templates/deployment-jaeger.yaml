{{- if .Values.jaeger.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "krystalinex.fullname" . }}-jaeger
  labels:
    {{- include "krystalinex.labels" . | nindent 4 }}
    app.kubernetes.io/component: jaeger
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "krystalinex.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: jaeger
  template:
    metadata:
      labels:
        {{- include "krystalinex.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: jaeger
    spec:
      containers:
        - name: jaeger
          image: "{{ .Values.jaeger.image.repository }}:{{ .Values.jaeger.image.tag }}"
          ports:
            - name: ui
              containerPort: 16686
            - name: admin
              containerPort: 14269
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
            - name: QUERY_BASE_PATH
              value: "/jaeger"
            - name: SPAN_STORAGE_TYPE
              value: "badger"
            - name: BADGER_EPHEMERAL
              value: "false"
            - name: BADGER_DIRECTORY_VALUE
              value: "{{ .Values.jaeger.storage.badger.directory }}/data"
            - name: BADGER_DIRECTORY_KEY
              value: "{{ .Values.jaeger.storage.badger.directory }}/key"
            - name: BADGER_MAINTENANCE_INTERVAL
              value: "{{ .Values.jaeger.storage.badger.maintenanceInterval }}"
          volumeMounts:
            - name: badger-data
              mountPath: {{ .Values.jaeger.storage.badger.directory }}
          livenessProbe:
            httpGet:
              path: /
              port: ui
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: ui
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.jaeger.resources | nindent 12 }}
      volumes:
        - name: badger-data
          {{- if .Values.jaeger.storage.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "krystalinex.fullname" . }}-jaeger-badger
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "krystalinex.fullname" . }}-jaeger
  labels:
    {{- include "krystalinex.labels" . | nindent 4 }}
    app.kubernetes.io/component: jaeger
spec:
  type: {{ .Values.jaeger.service.type }}
  ports:
    - port: {{ .Values.jaeger.service.ports.ui }}
      targetPort: ui
      name: ui
    - port: 14269
      targetPort: admin
      name: admin
    - port: {{ .Values.jaeger.service.ports.otlpGrpc }}
      targetPort: otlp-grpc
      name: otlp-grpc
    - port: {{ .Values.jaeger.service.ports.otlpHttp }}
      targetPort: otlp-http
      name: otlp-http
  selector:
    {{- include "krystalinex.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: jaeger
{{- end }}
