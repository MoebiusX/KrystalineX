{{- if .Values.kong.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "krystalinex.fullname" . }}-kong
  labels:
    {{- include "krystalinex.labels" . | nindent 4 }}
    app.kubernetes.io/component: kong
spec:
  replicas: {{ .Values.kong.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "krystalinex.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: kong
  template:
    metadata:
      labels:
        {{- include "krystalinex.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: kong
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-kong.yaml") . | sha256sum }}
    spec:
      containers:
        - name: kong
          image: "{{ .Values.kong.image.repository }}:{{ .Values.kong.image.tag }}"
          imagePullPolicy: {{ .Values.kong.image.pullPolicy | default "IfNotPresent" }}
          env:
            - name: KONG_DATABASE
              value: "off"
            - name: KONG_DECLARATIVE_CONFIG
              value: /kong/kong.yml
            - name: KONG_PROXY_ACCESS_LOG
              value: /dev/stdout
            - name: KONG_ADMIN_ACCESS_LOG
              value: /dev/stdout
            - name: KONG_PROXY_ERROR_LOG
              value: /dev/stderr
            - name: KONG_ADMIN_ERROR_LOG
              value: /dev/stderr
            - name: KONG_ADMIN_LISTEN
              value: "0.0.0.0:8001"
            - name: KONG_STATUS_LISTEN
              value: "0.0.0.0:8100"
            - name: KONG_PROXY_LISTEN
              value: "0.0.0.0:8000"
            - name: KONG_TRACING_INSTRUMENTATIONS
              value: "all"
            - name: KONG_TRACING_SAMPLING_RATE
              value: "1.0"
          ports:
            - name: proxy
              containerPort: 8000
              protocol: TCP
            - name: admin
              containerPort: 8001
              protocol: TCP
            - name: status
              containerPort: 8100
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /status
              port: status
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /status
              port: status
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.kong.resources | nindent 12 }}
          volumeMounts:
            - name: kong-config
              mountPath: /kong
              readOnly: true
      volumes:
        - name: kong-config
          configMap:
            name: {{ include "krystalinex.fullname" . }}-kong-config
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "krystalinex.fullname" . }}-kong
  labels:
    {{- include "krystalinex.labels" . | nindent 4 }}
    app.kubernetes.io/component: kong
spec:
  type: ClusterIP
  ports:
    - name: proxy
      port: {{ .Values.kong.service.ports.proxy | default 8000 }}
      targetPort: proxy
      protocol: TCP
    - name: admin
      port: {{ .Values.kong.service.ports.admin | default 8001 }}
      targetPort: admin
      protocol: TCP
    - name: status
      port: 8100
      targetPort: status
      protocol: TCP
  selector:
    {{- include "krystalinex.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: kong
{{- end }}
