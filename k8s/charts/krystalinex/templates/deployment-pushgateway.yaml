{{- if .Values.pushgateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "krystalinex.fullname" . }}-pushgateway
  labels:
    {{- include "krystalinex.labels" . | nindent 4 }}
    app.kubernetes.io/component: pushgateway
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "krystalinex.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: pushgateway
  template:
    metadata:
      labels:
        {{- include "krystalinex.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: pushgateway
    spec:
      containers:
        - name: pushgateway
          image: "{{ .Values.pushgateway.image.repository }}:{{ .Values.pushgateway.image.tag }}"
          ports:
            - name: http
              containerPort: 9091
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9091
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9091
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            limits:
              cpu: {{ .Values.pushgateway.resources.limits.cpu }}
              memory: {{ .Values.pushgateway.resources.limits.memory }}
            requests:
              cpu: {{ .Values.pushgateway.resources.requests.cpu }}
              memory: {{ .Values.pushgateway.resources.requests.memory }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "krystalinex.fullname" . }}-pushgateway
  labels:
    {{- include "krystalinex.labels" . | nindent 4 }}
    app.kubernetes.io/component: pushgateway
spec:
  type: {{ .Values.pushgateway.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.pushgateway.service.port }}
      targetPort: http
      name: http
  selector:
    {{- include "krystalinex.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: pushgateway
{{- end }}
